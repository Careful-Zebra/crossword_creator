<!DOCTYPE html> 
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Crossword Creator</title>
    </head>
    <body>
        <header>
            <h1>Crossword Creator</h1>
        </header>

        <main>
            

            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
                <a href="{% url 'enter_code' %}" class="btn" style="background-color: #0056b3; color: white; padding: 15px; text-decoration: none; font-size: 1.1em; border-radius: 5px;">
                    Enter a Code to Play a Game
                </a>
                <a href="{% url 'create_crossword' %}" class="btn" style="background-color: #169618; color: white; padding: 15px; text-decoration: none; font-size: 1.1em; border-radius: 5px;">
                    Create a New Crossword 
                </a>
                
            </div>
        </div>
        </main>
    </body>
</html>
